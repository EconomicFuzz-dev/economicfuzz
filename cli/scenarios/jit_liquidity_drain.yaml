name: just_in_time_liquidity_drain
description: |
  An MEV bot detects a large pending swap, injects liquidity into the pool
  the swap will route through milliseconds before block inclusion, captures
  the swap's fee revenue, and withdraws liquidity back out in the next slot.
  Net effect: organic LP yield is siphoned without contributing real
  market-making capital.

target:
  protocol: orca-clmm
  pool: SOL/USDC

actors:
  - id: mev_bot
    type: lp + swapper
    starting_balance:
      sol: 1000
      usdc: 200000
  - id: victim
    type: swapper
    starting_balance:
      sol: 0
      usdc: 50000

actions:
  # mempool watch — victim's swap is observed
  - actor: victim
    type: announce_swap
    params:
      in: usdc
      out: sol
      amount: 50000
      max_slippage_bps: 50

  # JIT inject — narrow band right at the swap price
  - actor: mev_bot
    type: add_liquidity
    params:
      amount_a_sol: 800
      amount_b_usdc: 160000
      tick_lower: -50
      tick_upper: +50

  - actor: victim
    type: execute_swap

  # withdraw immediately
  - actor: mev_bot
    type: remove_liquidity
    params:
      pct: 100

invariants:
  - description: organic LPs receive at least 70% of total fees
    probe: lp_fee_share
    expect:
      min: 0.70
  - description: pool TVL stable across the attack window
    probe: tvl_drift_pct
    expect:
      max: 0.05

severity: high
notes: |
  Mitigations: minimum LP holding period, fee-tier cliff that disqualifies
  short-lived positions, or mempool-shielded orderflow auctions.
