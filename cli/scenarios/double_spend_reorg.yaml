name: validator_double_spend_via_reorg
description: |
  A privileged validator observes a victim's tx land in slot N, then forges
  a sibling block at the same height that excludes (or replaces) the victim
  tx. After confirmation depth, user-space considered the original
  finalized; the reorg invalidates that assumption.

  Modeling assumes the validator captured leader-slot for slot N and the
  immediate successor.

target:
  protocol: any
  surface: settlement-finality

actors:
  - id: validator_attacker
    type: leader
    starting_balance:
      sol: 50000
    capabilities:
      - leader_slot_n
      - leader_slot_n_plus_1
  - id: victim_user
    type: caller
    starting_balance:
      sol: 1000
      usdc: 50000

actions:
  - actor: victim_user
    type: send_tx
    params:
      from: usdc
      to: sol
      amount: 25000
      submit_slot: N

  - actor: validator_attacker
    type: produce_block
    params:
      slot: N
      include: [victim_user.tx]
      visibility: gossip

  - actor: victim_user
    type: assume_finality
    params:
      depth: 1

  - actor: validator_attacker
    type: produce_block
    params:
      slot: N
      include: []
      visibility: subset
      replaces_at_finality: true

  - actor: validator_attacker
    type: forge_successor
    params:
      slot: N+1
      forks_from: alt-slot-N

invariants:
  - description: tx finalized at depth ≥ 31 should remain finalized
    probe: tx_finality_inversion
    expect:
      max: 0
  - description: leader cannot censor the same tx across two consecutive slots
    probe: censorship_streak_slots
    expect:
      max: 1

severity: extreme
notes: |
  Real-world likelihood is low — Solana's PoH prevents trivial forks and
  super-majority stake distribution makes single-validator reorgs visible
  at confirmation depth ≥ 32. Modeled here for completeness; mitigations
  are protocol-level (PoH lockouts) rather than per-DApp.
