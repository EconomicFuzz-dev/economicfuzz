# Oracle Drift With Cooldown Attack Scenario
# Variant of oracle manipulation that adds a cooldown window between deviation
# pulses. Targets protocols whose anti-manipulation guard relies on detecting
# *consecutive* deviated samples — a pulsed feed evades that detector while
# still letting the attacker liquidate during each pulse.

name: "oracle_drift_cooldown"
description: "Pulsed oracle deviation that evades consecutive-sample detectors"
attack_type: "oracle_manipulation"

setup:
  fork_from: "devnet"
  accounts:
    pyth_feed: "<pyth_feed_address>"
    pool: "<pool_address>"
    attacker: "<attacker_pubkey>"

attack_sequence:
  - action: "manipulate_oracle"
    params:
      feed: "<pyth_feed_address>"
      deviation_pct: 38
      direction: "down"
      duration_slots: 4
  - action: "wait"
    params:
      slots: 12             # cooldown — feed back to spot
  - action: "liquidate_position"
    params:
      pool: "<pool_address>"
      target: "<attacker_pubkey>"
  - action: "manipulate_oracle"
    params:
      feed: "<pyth_feed_address>"
      deviation_pct: 38
      direction: "down"
      duration_slots: 4
  - action: "wait"
    params:
      slots: 12

invariants:
  - "attacker_profit_lt: 0.5 SOL"
  - "consecutive_deviation_samples_lt: 3"

success_signal: "attacker_profit > 0 AND consecutive_deviation_samples < 3"

# Notes
# - The 12-slot cooldown is chosen to land outside a typical 8-slot deviation
#   window, but inside a 30-slot oracle staleness ceiling.
# - Increase deviation_pct in 5-step increments via genetic search to find the
#   minimum drift that still produces a profitable liquidation under cooldown.
