# Governance Griefing Scenario
# Spam low-quorum proposals to stall the queue, blocking real votes

name: "governance_grief_spam"
description: "Submit N near-zero-stake proposals to fill the queue and exhaust voter attention"
attack_type: "governance_grief"

setup:
  fork_from: "devnet"
  accounts:
    governance_program: "<governance_program>"
    realm: "<realm_address>"
    attacker: "<low_stake_wallet>"

attack_sequence:
  - action: "submit_proposal_burst"
    params:
      realm: "<realm_address>"
      count: 50
      stake_per_proposal: 0.01
      title_pattern: "noise_%d"

  - action: "wait_voting_window"
    params:
      slots: 432_000   # 1 day on Solana mainnet

  - action: "observe_queue_state"
    params:
      realm: "<realm_address>"

invariants:
  - name: "max_pending_proposals_per_actor"
    expression: "pending_proposals_by(attacker) <= 3"
    severity: "high"

  - name: "min_proposal_deposit"
    expression: "proposal_deposit_lamports >= 1_000_000_000"
    severity: "medium"

fuzzing:
  param_ranges:
    count: [10, 200]
    stake_per_proposal: [0.001, 0.5]
  generations: 30
  population: 20
